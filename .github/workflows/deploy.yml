name: Deploy to Lolipop FTP

on:
  push:
    branches:
      - main # mainブランチにpushされた時のみ実行。ご自身の環境に合わせて変更してください。

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Get latest code
        uses: actions/checkout@v4
      
      - name: 📂 Sync files
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 2222
          server-dir: /tech-ramukana.jp/ # ロリポップの公開フォルダのパスを指定。ルートの場合は /
          # local-dir: ./dist/ # もしビルド成果物をアップする場合は指定します
          protocol: ftps # ロリポップはFTPS(FTP over SSL/TLS)に対応しているためftpsを推奨
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            README.md
